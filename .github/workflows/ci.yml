name: CI

# Build on every PR (opened, synchronized, reopened) targeting main, and on
# every push to main.
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: write # required by the dependency-submission step below
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up JDK 25 (Temurin)
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build, unit test, and integration test
        # `verify` runs unit tests (surefire, *Test.java) followed by
        # integration tests (failsafe, *IT.java) against the packaged app.
        run: mvn -B clean verify --file pom.xml

      - name: Publish test reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: test-reports
          path: |
            target/surefire-reports/
            target/failsafe-reports/
          retention-days: 7

      - name: Submit dependency graph
        # Keeps Dependabot alerts accurate. Only needed on the default
        # branch, not on every PR from a fork.
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: advanced-security/maven-dependency-submission-action@3a183dc11227df3dd6351cfffb472965b9265da1 # v5

  code-quality:
    runs-on: ubuntu-latest
    needs: build-and-test
    # Skip on PRs from forks: they can't see repo secrets (SONAR_TOKEN), so
    # the scan would just fail loudly instead of being skipped gracefully.
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          # SonarQube Cloud's "New Code" analysis diffs against history; a
          # shallow (depth-1) checkout would make every line look "new".
          fetch-depth: 0

      - name: Set up JDK 25 (Temurin)
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Cache SonarQube Cloud analysis cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar

      - name: Build, test, and scan with SonarQube Cloud
        # `verify` produces the JaCoCo coverage report (see pom.xml), then
        # `sonar:sonar` uploads it alongside static analysis. Requires three
        # repo-level secrets set once in GitHub (Settings > Secrets and
        # variables > Actions > Secrets): SONAR_TOKEN, SONAR_ORGANIZATION,
        # SONAR_PROJECT_KEY (all three come from the project you create at
        # sonarcloud.io). None of these are printed in logs even though
        # org/project key aren't strictly sensitive - secrets are just where
        # they're already set up.
        #
        # Secrets are passed via `env` rather than expanded directly into the
        # `run` script (SonarQube rule: avoid expanding secrets in a run
        # block) - GitHub Actions substitutes ${{ secrets.* }} into the raw
        # command text before the shell ever sees it, which is more exposed
        # than an env var the shell resolves itself.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # enables PR decoration
          SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}
          SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar
          -Dsonar.host.url=https://sonarcloud.io
          -Dsonar.organization="$SONAR_ORGANIZATION"
          -Dsonar.projectKey="$SONAR_PROJECT_KEY"
          -Dsonar.token="$SONAR_TOKEN"

  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Build image (validation only, no push)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          push: false
          tags: my-spring-app:ci

      - name: Validate docker-compose.yml
        run: docker compose config --quiet
