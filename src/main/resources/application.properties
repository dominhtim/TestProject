# Spring Boot Configuration for Task CRUD Application

spring.application.name=my-spring-app

# Server Port
server.port=8080

# H2 Database Configuration (in-memory)
spring.datasource.url=jdbc:h2:mem:taskdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# JPA/Hibernate Configuration
# 'create-drop' means the schema will be created on startup and dropped on shutdown.
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Enable H2 Console for easy database viewing (URL: http://localhost:8080/h2-console)
spring.h2.console.enabled=true

# Show the real error (message + validation errors) in API responses instead
# of Spring's bare {"status":400,"error":"Bad Request"} default. Useful for
# a demo/dev app; for anything public-facing you'd want this off (it can
# leak internal details) and rely on server-side logs instead.
server.error.include-message=always
server.error.include-binding-errors=always

# ============================================================
# Observability
# ============================================================

# Actuator: only expose what's actually needed. Never use "*" here - this
# app has no Spring Security configured, so anything exposed is reachable
# by anyone. (See SECURITY.md re: CVE-2026-40976, patched in 4.0.6+, which
# was specifically about actuator endpoints being unintentionally wide open.)
management.endpoints.web.exposure.include=health,info,prometheus,metrics
# Don't leak dependency/config details (disk space, DB URL, etc.) to
# unauthenticated callers.
management.endpoint.health.show-details=never

# Micrometer + Prometheus: with micrometer-registry-prometheus on the
# classpath, Spring Boot auto-configures a PrometheusMeterRegistry and
# serves it at /actuator/prometheus (see the exposure include above).

# Distributed tracing: sample 100% of requests locally so every request
# shows up in Jaeger. Turn this down (e.g. 0.1) in production.
management.tracing.sampling.probability=1.0
# Where to send OTLP spans - the local Jaeger container's OTLP/HTTP
# receiver (see docker-compose.yml).
management.opentelemetry.tracing.export.otlp.endpoint=http://localhost:4318/v1/traces

# Structured JSON logging (built into Spring Boot since 3.4, no extra
# dependency needed). ECS format includes trace_id/span_id automatically
# once tracing is active, so logs and traces can be correlated.
logging.structured.format.console=ecs

# ============================================================
# API Documentation (springdoc-openapi / Swagger UI)
# ============================================================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha
